<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sidebar Test</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="sidebar">
    <div class="item" onclick="activate(this)">T</div>
    <div class="item" onclick="activate(this)">R</div>
    <div class="item" onclick="activate(this)">E</div>
    <div class="item" onclick="activate(this)">C</div>
    <div class="item" onclick="activate(this)">K</div>
    <div class="item" onclick="activate(this)">S</div>
</div>

<script>
function activate(element) {
    document.querySelectorAll(".item").forEach(el => {
        el.classList.remove("active");
    });
    element.classList.add("active");
}
</script>

</body>
</html>
