<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyTask</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="tab todo active" onclick="showCategory('todo')">TO DO</div>
        <div class="tab routine" onclick="showCategory('routine')">ROUTINE</div>
        <div class="tab event" onclick="showCategory('event')">EVENT</div>
        <div class="tab checklist" onclick="showCategory('checklist')">CHECK</div>
        <div class="tab calendar" onclick="showCategory('calendar')">CAL</div>
    </div>

    <!-- MAIN -->
    <div class="main">

        <div id="inputArea" class="inputArea">
            <input type="text" id="taskInput" placeholder="Neue Aufgabe...">
            <input type="date" id="dateInput">
            <select id="priorityInput">
                <option value="low">Niedrig</option>
                <option value="medium">Mittel</option>
                <option value="high">Hoch</option>
            </select>
            <button onclick="addTask()">+</button>
        </div>

        <div id="content"></div>

    </div>

</div>

<script src="app.js"></script>
</body>
</html>
